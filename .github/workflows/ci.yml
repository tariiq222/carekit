name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: carekit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Generate Prisma Client
        working-directory: apps/backend
        run: npx prisma generate

      - name: Run migrations
        working-directory: apps/backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/carekit_test

      - name: Unit tests
        working-directory: apps/backend
        run: npm run test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/carekit_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-32chars-minimum!!
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32chars!!

      - name: E2E tests
        working-directory: apps/backend
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/carekit_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-32chars-minimum!!
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32chars!!

  api-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Generate Prisma Client
        working-directory: apps/backend
        run: npx prisma generate
      - name: Build backend
        working-directory: apps/backend
        run: npm run build
      - name: Regenerate openapi.json
        working-directory: apps/backend
        run: npm run openapi:snapshot
      - name: Fail if snapshot drifted
        run: git diff --exit-code apps/backend/openapi.json
      - name: Coverage check
        working-directory: apps/backend
        run: npm run check:openapi-coverage

  leaderboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Typecheck
        working-directory: apps/leaderboard
        run: npm run typecheck
      - name: Lint
        working-directory: apps/leaderboard
        run: npm run lint
      - name: Build
        working-directory: apps/leaderboard
        run: npm run build

