name: Promote develop → main (manual)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "promote" to confirm pushing develop to main'
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  sync-staging:
    name: Build clean main branch from develop
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "promote" ]; then
            echo "❌ Confirmation must be exactly 'promote'. Got: '${{ inputs.confirm }}'"
            exit 1
          fi
          echo "✅ Confirmation accepted"

      - name: Checkout develop (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify changesets
        run: node scripts/verify-changesets.mjs

      - name: Consume pending changesets (version bump + CHANGELOG)
        id: consume
        run: |
          set -euo pipefail
          CHANGESET_COUNT=$(ls .changeset/*.md 2>/dev/null | grep -v README.md | wc -l | tr -d ' ')
          if [ "$CHANGESET_COUNT" -gt 0 ]; then
            echo "Found $CHANGESET_COUNT pending changeset(s) — running version..."
            pnpm changeset version
            git add -A
            if ! git diff --staged --quiet; then
              git commit -m "chore(release): version packages [skip ci]"
              git push origin develop
              echo "consumed=true" >> $GITHUB_OUTPUT
            else
              echo "changeset version produced no diff — strange but continuing."
              echo "consumed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "No pending changesets — proceeding with current versions."
            echo "consumed=false" >> $GITHUB_OUTPUT
          fi

      - name: Capture per-app versions
        id: versions
        run: |
          set -euo pipefail
          BACKEND_V=$(node -p "require('./apps/backend/package.json').version")
          DASHBOARD_V=$(node -p "require('./apps/dashboard/package.json').version")
          ADMIN_V=$(node -p "require('./apps/admin/package.json').version")
          WEBSITE_V=$(node -p "require('./apps/website/package.json').version")
          echo "backend=$BACKEND_V" >> $GITHUB_OUTPUT
          echo "dashboard=$DASHBOARD_V" >> $GITHUB_OUTPUT
          echo "admin=$ADMIN_V" >> $GITHUB_OUTPUT
          echo "website=$WEBSITE_V" >> $GITHUB_OUTPUT
          echo "Captured versions: backend=$BACKEND_V, dashboard=$DASHBOARD_V, admin=$ADMIN_V, website=$WEBSITE_V"

      - name: Append version-history.md row
        run: |
          set -euo pipefail
          HISTORY="docs/operations/version-history.md"
          PROMOTED_AT=$(date -u +"%Y-%m-%d %H:%M UTC")
          SOURCE_SHORT=$(git rev-parse --short HEAD)
          if [ ! -f "$HISTORY" ]; then
            mkdir -p "$(dirname "$HISTORY")"
            cat > "$HISTORY" <<'EOF'
          # Version History

          Per-deploy ledger appended automatically by `promote-to-main.yml`.
          See `apps/<app>/CHANGELOG.md` for the change details behind each version.

          | Promoted at (UTC) | backend | dashboard | admin | website | Source SHA |
          |---|---|---|---|---|---|
          EOF
          fi
          printf "| %s | v%s | v%s | v%s | v%s | %s |\n" \
            "$PROMOTED_AT" \
            "${{ steps.versions.outputs.backend }}" \
            "${{ steps.versions.outputs.dashboard }}" \
            "${{ steps.versions.outputs.admin }}" \
            "${{ steps.versions.outputs.website }}" \
            "$SOURCE_SHORT" >> "$HISTORY"
          git add "$HISTORY"
          if ! git diff --staged --quiet; then
            git commit -m "chore(release): record promote in version-history.md [skip ci]"
            git push origin develop
          fi

      - name: Build clean main branch
        env:
          CI: "true"
        run: |
          set -euo pipefail
          SOURCE_SHA=$(git rev-parse HEAD)
          SOURCE_SHORT=$(git rev-parse --short HEAD)

          # Run sanitizer — produces ./main-tree/
          bash scripts/sync-main-branch.sh

          # Create orphan branch with the cleaned tree
          cd main-tree
          git init -b main
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add -A
          git commit \
            -m "Production promote from develop @ ${SOURCE_SHORT}" \
            -m "Source: ${SOURCE_SHA}" \
            -m "Versions: backend=v${{ steps.versions.outputs.backend }}, dashboard=v${{ steps.versions.outputs.dashboard }}, admin=v${{ steps.versions.outputs.admin }}, website=v${{ steps.versions.outputs.website }}"
          git push --force origin main

      - name: Trigger build-images workflow on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh workflow run build-images.yml --ref main --repo ${{ github.repository }}
          echo "✅ build-images workflow dispatched on main"
          echo "Watch: https://github.com/${{ github.repository }}/actions/workflows/build-images.yml"
