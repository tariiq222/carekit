name: Nightly E2E

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

env:
  NODE_ENV: test
  TENANT_ENFORCEMENT: strict
  DATABASE_URL: postgresql://postgres:test@localhost:5432/deqah_test

jobs:
  e2e-full:
    name: Full E2E Suite
    runs-on: ubuntu-latest
    timeout-minutes: 90

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: deqah_test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations
        run: cd apps/backend && npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run E2E — Tenant Isolation
        run: cd apps/backend && npx jest test/e2e/common/ --verbose --runInBand

      - name: Run E2E — Bookings
        run: cd apps/backend && npx jest test/e2e/bookings/ --verbose --runInBand

      - name: Run E2E — Finance
        run: cd apps/backend && npx jest test/e2e/finance/ --verbose --runInBand