name: Sync Staging Branch

on:
  push:
    branches:
      - develop

permissions:
  contents: write

jobs:
  sync-staging:
    name: Build clean staging branch from develop
    runs-on: ubuntu-latest

    steps:
      - name: Checkout develop (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build clean staging branch
        env:
          CI: "true"
        run: |
          set -euo pipefail
          SOURCE_SHA=$(git rev-parse HEAD)
          SOURCE_SHORT=$(git rev-parse --short HEAD)

          # Run sanitizer — produces ./staging-tree/
          bash scripts/sync-staging-branch.sh

          # Create orphan branch with the cleaned tree
          cd staging-tree
          git init -b staging
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add -A
          git commit \
            -m "Staging sync from develop @ ${SOURCE_SHORT}" \
            -m "Source: ${SOURCE_SHA}"
          git push --force origin staging
