<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareKit — خطة التنفيذ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080d1a; --surface: #0f172a; --surface2: #1e293b;
    --border: rgba(255,255,255,0.07); --text: #e2e8f0; --muted: #64748b;
  }
  body { font-family: 'IBM Plex Sans Arabic','Segoe UI',system-ui,sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { padding: 20px 28px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; background: rgba(8,13,26,0.95); backdrop-filter: blur(12px); z-index: 100; }
  .header-left h1 { font-size: 18px; font-weight: 700; color: #f8fafc; }
  .header-left p { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .stats { display: flex; gap: 16px; flex-wrap: wrap; }
  .stat { text-align: center; padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); }
  .stat-num { font-size: 20px; font-weight: 800; }
  .stat-label { font-size: 10px; color: var(--muted); }
  .stat.todo .stat-num { color: #94a3b8; }
  .stat.inprog .stat-num { color: #fde047; }
  .stat.done .stat-num { color: #4ade80; }

  .phase-nav { padding: 12px 28px; display: flex; gap: 6px; overflow-x: auto; border-bottom: 1px solid var(--border); background: var(--surface); }
  .phase-tab { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid transparent; white-space: nowrap; transition: all 0.15s; color: var(--muted); background: transparent; }
  .phase-tab:hover { color: var(--text); background: var(--surface2); }
  .phase-tab.active { color: #f8fafc; background: var(--surface2); border-color: rgba(255,255,255,0.1); }
  .phase-badge { display: inline-block; width: 20px; height: 18px; border-radius: 4px; font-size: 10px; font-weight: 800; text-align: center; line-height: 18px; margin-right: 6px; }

  .main { padding: 24px 28px; }
  .phase-header { margin-bottom: 16px; padding: 14px 18px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .phase-info { display: flex; align-items: center; gap: 12px; }
  .phase-num-big { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; }
  .phase-titles h2 { font-size: 16px; font-weight: 700; }
  .phase-titles p { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .phase-progress-wrap { display: flex; align-items: center; gap: 10px; }
  .progress-bar { width: 120px; height: 6px; border-radius: 99px; background: var(--surface2); overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg,#4ade80,#22d3ee); transition: width 0.3s; }
  .progress-label { font-size: 11px; color: var(--muted); }

  .kanban { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .column { border-radius: 14px; border: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; min-height: 400px; }
  .column-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .column-title { font-size: 13px; font-weight: 700; }
  .col-todo .column-title { color: #94a3b8; }
  .col-inprog .column-title { color: #fde047; }
  .col-done .column-title { color: #4ade80; }
  .column-count { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .col-todo .column-count { background: rgba(100,116,139,0.1); color: #94a3b8; border: 1px solid rgba(100,116,139,0.3); }
  .col-inprog .column-count { background: rgba(234,179,8,0.08); color: #fde047; border: 1px solid rgba(234,179,8,0.35); }
  .col-done .column-count { background: rgba(34,197,94,0.08); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  .column-body { padding: 10px; flex: 1; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }

  .task-card { border-radius: 10px; padding: 12px 13px; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; transition: all 0.15s; }
  .task-card:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.12); }
  .task-title { font-size: 12px; font-weight: 600; color: #f1f5f9; line-height: 1.4; margin-bottom: 6px; }
  .task-detail { font-size: 11px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; display: none; }
  .task-card.expanded .task-detail { display: block; }
  .task-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
  .task-bc { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .task-complexity { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
  .cx-COMPLEX { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }
  .cx-MEDIUM  { background: rgba(251,191,36,0.12); color: #fde047; border: 1px solid rgba(251,191,36,0.2); }
  .cx-CRUD    { background: rgba(100,116,139,0.12); color: #94a3b8; border: 1px solid rgba(100,116,139,0.2); }
  .task-actions { display: flex; gap: 4px; margin-top: 8px; }
  .btn-move { font-size: 10px; padding: 3px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.12s; }
  .btn-move:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  .btn-inprog:hover { color: #fde047; border-color: rgba(234,179,8,0.4); }
  .btn-done:hover   { color: #4ade80; border-color: rgba(34,197,94,0.4); }
  .btn-todo:hover   { color: #94a3b8; border-color: rgba(100,116,139,0.4); }
  .empty-col { display: flex; align-items: center; justify-content: center; min-height: 80px; color: var(--muted); font-size: 12px; }

  .bc-foundation,.bc-common { background: rgba(100,116,139,0.15); color: #94a3b8; border: 1px solid rgba(100,116,139,0.25); }
  .bc-identity  { background: rgba(239,68,68,0.12);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }
  .bc-platform  { background: rgba(244,63,94,0.12);  color: #fda4af; border: 1px solid rgba(244,63,94,0.25); }
  .bc-people    { background: rgba(249,115,22,0.12); color: #fdba74; border: 1px solid rgba(249,115,22,0.25); }
  .bc-clinic    { background: rgba(6,182,212,0.12);  color: #67e8f9; border: 1px solid rgba(6,182,212,0.25); }
  .bc-media     { background: rgba(251,146,60,0.12); color: #fb923c; border: 1px solid rgba(251,146,60,0.25); }
  .bc-finance   { background: rgba(34,197,94,0.12);  color: #86efac; border: 1px solid rgba(34,197,94,0.25); }
  .bc-bookings  { background: rgba(234,179,8,0.12);  color: #fde047; border: 1px solid rgba(234,179,8,0.25); }
  .bc-comms     { background: rgba(99,102,241,0.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.25); }
  .bc-ops       { background: rgba(20,184,166,0.12); color: #5eead4; border: 1px solid rgba(20,184,166,0.25); }
  .bc-ai        { background: rgba(168,85,247,0.12); color: #d8b4fe; border: 1px solid rgba(168,85,247,0.25); }
  .bc-api       { background: rgba(139,92,246,0.12); color: #c4b5fd; border: 1px solid rgba(139,92,246,0.25); }

  .pc-1  { background:rgba(99,102,241,0.15);  color:#818cf8; }
  .pc-2  { background:rgba(239,68,68,0.15);   color:#f87171; }
  .pc-3  { background:rgba(244,63,94,0.15);   color:#fb7185; }
  .pc-4  { background:rgba(249,115,22,0.15);  color:#fb923c; }
  .pc-5  { background:rgba(6,182,212,0.15);   color:#22d3ee; }
  .pc-6  { background:rgba(251,146,60,0.15);  color:#fb923c; }
  .pc-7  { background:rgba(34,197,94,0.15);   color:#4ade80; }
  .pc-8  { background:rgba(234,179,8,0.15);   color:#facc15; }
  .pc-9  { background:rgba(99,102,241,0.15);  color:#818cf8; }
  .pc-10 { background:rgba(20,184,166,0.15);  color:#2dd4bf; }
  .pc-11 { background:rgba(168,85,247,0.15);  color:#c084fc; }
  .pc-12 { background:rgba(139,92,246,0.15);  color:#a78bfa; }

  .save-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.4); color: #4ade80; padding: 8px 20px; border-radius: 10px; font-size: 12px; font-weight: 600; transition: transform 0.25s; z-index: 999; }
  .save-toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>CareKit Backend — خطة التنفيذ</h1>
    <p id="last-updated">جاري التحميل...</p>
  </div>
  <div class="stats">
    <div class="stat todo"><div class="stat-num" id="count-todo">—</div><div class="stat-label">Todo</div></div>
    <div class="stat inprog"><div class="stat-num" id="count-inprog">—</div><div class="stat-label">In Progress</div></div>
    <div class="stat done"><div class="stat-num" id="count-done">—</div><div class="stat-label">Done</div></div>
  </div>
</div>

<div class="phase-nav" id="phase-nav"></div>

<div class="main">
  <div class="phase-header" id="phase-header"></div>
  <div class="kanban" id="kanban"></div>
</div>

<div class="save-toast" id="save-toast">تم الحفظ</div>

<script>
const STORAGE_KEY = 'carekit-kanban-v1';
let state = null;
let activePhaseId = null;

function el(id) { return document.getElementById(id); }

function txt(node, t) { node.textContent = t; }

// ── Persistence ─────────────────────────────────────────────────────────────
function saveLocal() {
  state.lastUpdated = new Date().toISOString().split('T')[0];
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  showToast();
  updateStats();
  txt(el('last-updated'), 'آخر تحديث: ' + state.lastUpdated);
}

function showToast() {
  const t = el('save-toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ── Stats ────────────────────────────────────────────────────────────────────
function updateStats() {
  let todo = 0, inprog = 0, done = 0;
  state.phases.forEach(p => p.tasks.forEach(t => {
    if (t.status === 'todo') todo++;
    else if (t.status === 'inprog') inprog++;
    else done++;
  }));
  txt(el('count-todo'), todo);
  txt(el('count-inprog'), inprog);
  txt(el('count-done'), done);
}

// ── Interactions ─────────────────────────────────────────────────────────────
function moveTask(taskId, newStatus) {
  state.phases.forEach(p => p.tasks.forEach(t => {
    if (t.id === taskId) t.status = newStatus;
  }));
  saveLocal();
  render();
}

function toggleExpand(taskId) {
  const card = document.querySelector('[data-task="' + taskId + '"]');
  if (card) card.classList.toggle('expanded');
}

// ── DOM builders (no innerHTML with data) ────────────────────────────────────
function makeBtn(label, cls, taskId, status) {
  const b = document.createElement('button');
  b.className = 'btn-move ' + cls;
  b.textContent = label;
  b.addEventListener('click', function(e) { e.stopPropagation(); moveTask(taskId, status); });
  return b;
}

function makeTaskCard(task) {
  const card = document.createElement('div');
  card.className = 'task-card';
  card.dataset.task = task.id;
  card.addEventListener('click', () => toggleExpand(task.id));

  const title = document.createElement('div');
  title.className = 'task-title';
  title.textContent = task.title;

  const detail = document.createElement('div');
  detail.className = 'task-detail';
  detail.textContent = task.detail;

  const footer = document.createElement('div');
  footer.className = 'task-footer';

  const bc = document.createElement('span');
  bc.className = 'task-bc bc-' + task.bc;
  bc.textContent = task.bc;

  const cx = document.createElement('span');
  cx.className = 'task-complexity cx-' + task.complexity;
  cx.textContent = task.complexity;

  footer.appendChild(bc);
  footer.appendChild(cx);

  const actions = document.createElement('div');
  actions.className = 'task-actions';
  actions.addEventListener('click', e => e.stopPropagation());

  if (task.status !== 'todo')   actions.appendChild(makeBtn('← Todo', 'btn-move btn-todo', task.id, 'todo'));
  if (task.status !== 'inprog') actions.appendChild(makeBtn('In Progress', 'btn-move btn-inprog', task.id, 'inprog'));
  if (task.status !== 'done')   actions.appendChild(makeBtn('Done ✓', 'btn-move btn-done', task.id, 'done'));

  card.appendChild(title);
  card.appendChild(detail);
  card.appendChild(footer);
  card.appendChild(actions);
  return card;
}

function makeColumn(cls, label, tasks) {
  const col = document.createElement('div');
  col.className = 'column ' + cls;

  const header = document.createElement('div');
  header.className = 'column-header';

  const colTitle = document.createElement('span');
  colTitle.className = 'column-title';
  colTitle.textContent = label;

  const count = document.createElement('span');
  count.className = 'column-count';
  count.textContent = tasks.length;

  header.appendChild(colTitle);
  header.appendChild(count);

  const body = document.createElement('div');
  body.className = 'column-body';

  if (tasks.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-col';
    empty.textContent = 'لا توجد مهام';
    body.appendChild(empty);
  } else {
    tasks.forEach(t => body.appendChild(makeTaskCard(t)));
  }

  col.appendChild(header);
  col.appendChild(body);
  return col;
}

// ── Phase Nav ─────────────────────────────────────────────────────────────────
function renderPhaseNav() {
  const nav = el('phase-nav');
  while (nav.firstChild) nav.removeChild(nav.firstChild);

  state.phases.forEach(p => {
    const total = p.tasks.length;
    const done = p.tasks.filter(t => t.status === 'done').length;

    const btn = document.createElement('button');
    btn.className = 'phase-tab' + (p.id === activePhaseId ? ' active' : '');

    const badge = document.createElement('span');
    badge.className = 'phase-badge pc-' + p.order;
    badge.textContent = done + '/' + total;

    btn.appendChild(badge);
    btn.appendChild(document.createTextNode(p.titleAr));
    btn.addEventListener('click', () => { activePhaseId = p.id; render(); });
    nav.appendChild(btn);
  });
}

// ── Phase Header ──────────────────────────────────────────────────────────────
function renderPhaseHeader(phase) {
  const total = phase.tasks.length;
  const done = phase.tasks.filter(t => t.status === 'done').length;
  const pct = total ? Math.round((done / total) * 100) : 0;

  const wrap = el('phase-header');
  while (wrap.firstChild) wrap.removeChild(wrap.firstChild);

  const info = document.createElement('div');
  info.className = 'phase-info';

  const numBig = document.createElement('div');
  numBig.className = 'phase-num-big pc-' + phase.order;
  numBig.textContent = phase.order;

  const titles = document.createElement('div');
  titles.className = 'phase-titles';

  const h2 = document.createElement('h2');
  h2.textContent = phase.titleAr + ' — ' + phase.title;

  const desc = document.createElement('p');
  desc.textContent = phase.description;

  titles.appendChild(h2);
  titles.appendChild(desc);
  info.appendChild(numBig);
  info.appendChild(titles);

  const progressWrap = document.createElement('div');
  progressWrap.className = 'phase-progress-wrap';

  const bar = document.createElement('div');
  bar.className = 'progress-bar';
  const fill = document.createElement('div');
  fill.className = 'progress-fill';
  fill.style.width = pct + '%';
  bar.appendChild(fill);

  const label = document.createElement('span');
  label.className = 'progress-label';
  label.textContent = done + ' / ' + total + ' مكتملة';

  progressWrap.appendChild(bar);
  progressWrap.appendChild(label);

  wrap.appendChild(info);
  wrap.appendChild(progressWrap);
}

// ── Kanban ────────────────────────────────────────────────────────────────────
function renderKanban(phase) {
  const cols = { todo: [], inprog: [], done: [] };
  phase.tasks.forEach(t => { if (cols[t.status]) cols[t.status].push(t); });

  const kanban = el('kanban');
  while (kanban.firstChild) kanban.removeChild(kanban.firstChild);

  kanban.appendChild(makeColumn('col-todo',   'Todo',        cols.todo));
  kanban.appendChild(makeColumn('col-inprog', 'In Progress', cols.inprog));
  kanban.appendChild(makeColumn('col-done',   'Done',        cols.done));
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const phase = state.phases.find(p => p.id === activePhaseId) || state.phases[0];
  activePhaseId = phase.id;
  renderPhaseNav();
  renderPhaseHeader(phase);
  renderKanban(phase);
  updateStats();
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async function init() {
  // Try localStorage first (preserves user progress)
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { state = JSON.parse(saved); }
    catch(e) { state = null; }
  }

  // If no local state, load from JSON file
  if (!state) {
    try {
      const res = await fetch('kanban-state.json?' + Date.now());
      state = await res.json();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch(e) {
      txt(el('phase-nav'), 'خطأ: لم يتم تحميل kanban-state.json');
      return;
    }
  }

  activePhaseId = state.phases[0].id;
  txt(el('last-updated'), 'آخر تحديث: ' + (state.lastUpdated || '—'));
  render();
})();
</script>
</body>
</html>
