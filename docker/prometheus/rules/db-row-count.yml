# DB-12 — table row-count alerting
# Fires when any partition-candidate table approaches 5 M rows.
# At 5 M, open the DB-12 Phase 1+ work: native PG range partitioning design.
#
# Design notes reserved here:
#   - Partition by: createdAt (Booking, Payment, ActivityLog, Notification,
#     NotificationDeliveryLog, SmsDelivery) OR updatedAt (DocumentChunk).
#   - Strategy: native PG RANGE partitioning (NOT pg_partman — adds ops burden).
#   - Children: monthly (PARTITION FOR VALUES FROM ('2026-01-01') TO ('2026-02-01')).
#   - Default partition: always keep one to absorb out-of-range inserts safely.
#   - Migration path: table rename → new partitioned table → data move.
#     Likely requires a maintenance window unless zero-downtime via logical replication.
#   - Do NOT start this work until the alert fires in production.

groups:
  - name: db_partitioning
    rules:
      - alert: DbTableNearPartitionThreshold
        expr: db_table_row_count > 5000000
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Table {{ $labels.table }} has > 5M rows"
          description: |
            The table {{ $labels.table }} has {{ $value | humanize }} rows.
            This crosses the DB-12 partitioning trigger threshold.
            Open the DB-12 Phase 1+ implementation plan in
            docs/superpowers/plans/2026-05-02-db-audit-12-13-partitioning-orphan-sweeper.md
            to begin native PG range partitioning.
