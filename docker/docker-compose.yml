services:
  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    container_name: carekit-backend
    restart: unless-stopped
    ports:
      - "5100:5100"
    environment:
      DATABASE_URL: postgresql://carekit:carekit_dev_password@postgres:5432/carekit_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production-32c
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production-x
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: carekit
      PORT: 5100
      NODE_ENV: development
      BACKEND_URL: http://localhost:5100
      ALLOWED_ORIGINS: http://localhost:5103,http://localhost:5101,http://localhost:5001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5100/api/v1/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: carekit-postgres
    restart: unless-stopped
    ports:
      - "5999:5432"
    environment:
      POSTGRES_USER: carekit
      POSTGRES_PASSWORD: carekit_dev_password
      POSTGRES_DB: carekit_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carekit -d carekit_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: carekit-redis
    restart: unless-stopped
    ports:
      - "5380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: carekit-minio
    restart: unless-stopped
    ports:
      - "5200:9000"
      - "5201:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  minio_data:
