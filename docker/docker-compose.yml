services:
  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    container_name: deqah-backend
    restart: unless-stopped
    ports:
      - "5100:5100"
    environment:
      DATABASE_URL: postgresql://deqah:deqah_dev_password@postgres:5432/deqah_dev
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-jwt-access-secret-change-me-32c
      JWT_REFRESH_SECRET: dev-jwt-refresh-secret-change-me-32c
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      SMS_PROVIDER_ENCRYPTION_KEY: ZGV2LXNtcy1lbmNyeXB0aW9uLWtleS1jaGFuZ2VtZSE= # required: replace in production (must be exactly 32 bytes)
      ZOOM_PROVIDER_ENCRYPTION_KEY: ZGV2LXpvb20tZW5jcnlwdGlvbi1rZXktY2hhbmdlbWU= # required: replace in production
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: deqah
      PORT: 5100
      NODE_ENV: development
      BACKEND_URL: http://localhost:5100
      ALLOWED_ORIGINS: http://localhost:5103,http://localhost:5104,http://localhost:5101,http://localhost:5001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5100/api/v1/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: deqah-postgres
    restart: unless-stopped
    ports:
      - "5999:5432"
    environment:
      POSTGRES_USER: deqah
      POSTGRES_PASSWORD: deqah_dev_password
      POSTGRES_DB: deqah_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deqah -d deqah_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: deqah-redis
    restart: unless-stopped
    ports:
      - "5380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: deqah-minio
    restart: unless-stopped
    ports:
      - "5200:9000"
      - "5201:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  minio_data:
