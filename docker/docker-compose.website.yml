services:
  website:
    build:
      context: ..
      dockerfile: apps/website/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5100
    container_name: carekit-website
    restart: unless-stopped
    ports:
      - "5104:5104"
    environment:
      NODE_ENV: production
      PORT: "5104"
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: http://localhost:5100
      INTERNAL_API_URL: http://backend:5100
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      backend:
        condition: service_healthy
