# =============================================================================
# CareKit — Nginx Reverse Proxy Configuration
# Production-ready config for White Label clinic management platform
# =============================================================================

# Worker processes — auto-detect CPU cores
worker_processes auto;
worker_rlimit_nofile 2048;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # -------------------------------------------------------------------------
    # Core settings
    # -------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Max upload size (receipts, documents, profile photos)
    client_max_body_size 20M;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml
        text/javascript
        application/xml
        application/xml+rss;

    # -------------------------------------------------------------------------
    # Rate limiting zones
    # -------------------------------------------------------------------------

    # General API: 30 req/s per client IP, burst up to 50
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Auth endpoints: 5 req/s per client IP, burst up to 10
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # Standard rate-limit response
    limit_req_status 429;

    # -------------------------------------------------------------------------
    # Upstream — backend NestJS application
    # -------------------------------------------------------------------------
    upstream backend {
        server backend:3100;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # HTTP server — redirect all traffic to HTTPS
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Health check (available over HTTP for Docker healthcheck)
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS server — main entry point
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # -- SSL configuration ------------------------------------------------
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # -- Security headers --------------------------------------------------
        add_header X-Content-Type-Options    "nosniff"              always;
        add_header X-Frame-Options           "SAMEORIGIN"           always;
        add_header X-XSS-Protection          "1; mode=block"        always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'self';" always;
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

        # -- Health check (also on HTTPS) --------------------------------------
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # -- Auth endpoints (stricter rate limit) ------------------------------
        location ~ ^/api/v1/(auth|otp)/ {
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass http://backend;
            include /etc/nginx/proxy_params_common.conf;
        }

        # -- SSE: chatbot message streaming ------------------------------------
        location ~ ^/api/v1/chatbot/sessions/.+/messages/stream$ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://backend;
            include /etc/nginx/proxy_params_common.conf;

            # SSE-specific: disable buffering, long timeout
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # SSE headers
            add_header Cache-Control "no-cache";
            add_header X-Accel-Buffering "no";
        }

        # -- General API -------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://backend;
            include /etc/nginx/proxy_params_common.conf;
        }

        # -- Default: reject non-API requests ----------------------------------
        location / {
            return 404 '{"success":false,"error":{"code":"NOT_FOUND","message":"Resource not found"}}';
            add_header Content-Type application/json;
        }
    }
}
