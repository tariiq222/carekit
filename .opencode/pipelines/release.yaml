name: release
description: CareKit release pipeline — full validation + changelog
trigger: release

steps:
  - id: analyze
    agent: analyst
    type: analysis
    required: true
    escalate_to: deep-analyst
    escalate_when: "risk == HIGH"

  - id: setup-worktree
    agent: maestro
    type: setup
    required: true
    depends_on: analyze
    action: worktree_create

  - id: execute
    agent: auto
    type: execution
    required: true
    depends_on: setup-worktree
    workspace: worktree

  - id: test
    agent: tester
    type: gate
    required: true
    depends_on: execute
    retry:
      max: 3
      on_exhaust: escalate
    pass_condition: "tests_pass AND lint_clean AND types_check AND coverage >= 85"

  - id: quality
    agent: quality-judge
    type: gate
    required: true
    depends_on: test
    pass_condition: "average_score >= 8"

  - id: review
    agent: reviewer
    type: gate
    required: true
    depends_on: quality
    input_scope: diff_only

  - id: document
    agent: documenter
    type: finalization
    required: true
    depends_on: review
    actions:
      - conventional_commit
      - changelog_entry
      - version_bump
      - handoff_report
    auto_save_memory: true

  - id: merge-worktree
    agent: maestro
    type: finalization
    required: true
    depends_on: document
    action: worktree_merge
    on_conflict: escalate
