name: qa-check
description: CareKit QA Validator — production risk assessment before delivery
trigger: manual

preconditions:
  - review_complete: true    # review-diff must have passed

steps:
  - id: load-context
    type: context
    required: true
    sources:
      - memory:active_work.current_task_analysis
      - memory:active_work.review_complete
    scope: risk_level + risk_flags + reviewer_score_and_decision

  - id: qa-validator
    agent: qa-validator
    type: analysis
    required: true
    depends_on: load-context
    prompt_file: .opencode/agents/qa-validator.md
    input:
      - architect_analysis: "from:memory.current_task_analysis"
      - reviewer_report: "from:memory.review_complete"
    output:
      format: structured
      fields:
        - risk_level_confirmed
        - appointment_workflow_risk
        - regression_risk
        - data_integrity
        - production_stability
        - payment_regulatory_risk
        - score
        - decision
        - monitoring_notes
        - fail_reasons

  - id: qa-gate
    type: gate
    required: true
    depends_on: qa-validator
    pass_condition: "decision in ['QA_PASS', 'QA_PASS+monitor']"
    on_fail:
      action: return_to_architect
      message: "QA failed — this is a plan-level issue, not an execution issue. Architect must re-analyze with QA's fail_reasons as input."
      max_retries: 0    # no automatic retry — requires user review

  - id: output
    type: finalization
    required: true
    depends_on: qa-gate
    actions:
      - display_qa_report
      - save_to_memory
    memory_key: "active_work.qa_complete"
    next_step: "Run memory-write pipeline, then commit"
