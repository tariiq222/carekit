name: tokenscope
description: CareKit token scope enforcement — audit and trim context before expensive operations
trigger: manual

# Run this before any L or XL task to validate context is lean
# Also auto-invoked by implement-plan and write-tests before execution

steps:
  - id: audit-context
    type: analysis
    required: true
    description: "Audit what context is loaded for the current task"
    checks:
      - files_in_context:
          max: 10
          warn_at: 7
          action_on_exceed: prompt_trim
      - context_window_usage:
          warn_at: 60_percent
          stop_at: 80_percent
      - unnecessary_full_files:
          detect: "full file when diff or section is enough"
          action: trim_to_diff_or_section
      - agent_overlap:
          detect: "same file sent to multiple agents"
          action: deduplicate

  - id: trim-recommendations
    type: output
    required: true
    depends_on: audit-context
    output:
      - files_to_remove_from_context
      - sections_to_replace_files
      - estimated_token_savings

  - id: apply-trim
    type: confirmation
    required: false
    depends_on: trim-recommendations
    action: apply_trim_if_approved

  - id: output
    type: finalization
    required: true
    depends_on: apply-trim
    message: "Context trimmed. Token usage optimized for this task."

# CareKit-specific token rules encoded here:
rules:
  always_scope:
    - "Pass diff between stages, not full files"
    - "Use --testPathPattern for scoped test runs"
    - "Load opencode.md sections, not the full file"
    - "Pass implementation_plan steps, not the full architect output"
    - "Load only files in files_to_read_next from architect"

  never_do:
    - "Send full AGENTS.md to every step"
    - "Run full test suite when 1 module changed"
    - "Load all 30 backend modules when task touches 1"
    - "Pass full opencode.json to any agent"
    - "Scan entire codebase for context without specific need"
