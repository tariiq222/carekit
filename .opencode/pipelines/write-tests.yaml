name: write-tests
description: CareKit Test Engineer — write tests for every change, no exceptions
trigger: manual

preconditions:
  - implementation_complete: true    # implement-plan must have run

steps:
  - id: load-context
    type: context
    required: true
    sources:
      - memory:active_work.current_task_analysis    # architect required_tests
      - memory:active_work.implementation_complete  # executor files_changed
    scope: required_tests + files_changed + diff_only

  - id: read-changed-files
    type: file-read
    required: true
    depends_on: load-context
    files: "from:memory.implementation_complete.files_changed"
    mode: diff_only    # read diffs, not full files

  - id: test-engineer
    agent: test-engineer
    type: implementation
    required: true
    depends_on: read-changed-files
    prompt_file: .opencode/agents/test-engineer.md
    input:
      - required_tests: "from:plan.required_tests"
      - files_changed: "from:executor.files_changed"
      - diff: "from:read-changed-files"
    rules:
      - bug_fix_requires_regression: true
      - feature_requires_behavior_coverage: true
      - auth_change_requires_allow_and_deny: true
      - booking_logic_requires_integration: true
    output:
      format: structured
      fields:
        - tests_written
        - commands_run
        - coverage_delta
        - gaps_noted

  - id: run-tests
    agent: auto
    type: gate
    required: true
    depends_on: test-engineer
    commands:
      backend: "cd backend && npm run test -- --testPathPattern='<affected-module>'"
      dashboard: "cd dashboard && npm run test"
    pass_condition: "all_tests_pass"
    on_fail:
      action: return_to_test_engineer
      max_retries: 2
      on_exhaust: escalate_to_user

  - id: coverage-gate
    agent: auto
    type: gate
    required: false    # non-blocking but reported
    depends_on: run-tests
    command: "cd backend && npm run test:cov"
    pass_condition: "branch >= 40 AND function >= 50 AND line >= 50"
    on_fail:
      action: warn
      message: "Coverage below threshold. Note for tech debt."

  - id: output
    type: finalization
    required: true
    depends_on: run-tests
    actions:
      - display_test_delivery
      - save_to_memory
    memory_key: "active_work.tests_complete"
    next_step: "Run review-diff pipeline"
