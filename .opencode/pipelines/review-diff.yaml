name: review-diff
description: CareKit Reviewer — strict diff review for logic, TypeScript, security, and tests
trigger: manual

preconditions:
  - tests_complete: true    # write-tests must have run

steps:
  - id: load-context
    type: context
    required: true
    sources:
      - memory:active_work.current_task_analysis
      - memory:active_work.implementation_complete
      - memory:active_work.tests_complete
    scope: structured_summaries_only    # no full file contents

  - id: ui-ux-audit
    type: skill
    required: false    # only runs when diff touches dashboard components
    depends_on: load-context
    condition: "files_changed contains 'dashboard/components/' OR files_changed contains 'dashboard/app/'"
    skill: ui-ux-pro-max
    commands:
      - "python3 .claude/skills/ui-ux-pro-max/scripts/search.py 'accessibility' --domain ux"
      - "python3 .claude/skills/ui-ux-pro-max/scripts/search.py 'interaction' --domain ux"
    scope: ux_rules_only    # pass accessibility + interaction rules to reviewer as checklist
    note: "Reviewer uses these as supplemental checks for dashboard UI diffs."

  - id: get-diff
    type: git
    required: true
    depends_on: load-context
    command: "git diff HEAD~1..HEAD"    # or against base branch
    scope: diff_only

  - id: reviewer
    agent: reviewer
    type: analysis
    required: true
    depends_on: get-diff
    prompt_file: .opencode/agents/reviewer.md
    input:
      - architect_analysis: "from:memory.current_task_analysis"
      - executor_delivery: "from:memory.implementation_complete"
      - test_delivery: "from:memory.tests_complete"
      - diff: "from:get-diff"
    output:
      format: structured
      fields:
        - plan_adherence
        - logic_review
        - typescript_review
        - security_review
        - test_review
        - score
        - decision
        - tech_debt
        - fail_reasons

  - id: review-gate
    type: gate
    required: true
    depends_on: reviewer
    pass_condition: "decision in ['PASS', 'PASS+debt']"
    on_fail:
      action: return_to_executor
      max_retries: 1
      on_exhaust: escalate_to_user
      message: "Reviewer failed after 1 retry — escalating. Review fail_reasons and decide next step."

  - id: output
    type: finalization
    required: true
    depends_on: review-gate
    actions:
      - display_review_report
      - save_to_memory
    memory_key: "active_work.review_complete"
    next_step: "Run qa-check pipeline"
