name: implement-plan
description: CareKit Executor — implement an approved Architect plan with minimal scope
trigger: manual

preconditions:
  - architect_analysis_exists: true    # analyze-task must have run first
  - blocking_questions_resolved: true  # decision gate must be cleared

steps:
  - id: load-plan
    type: context
    required: true
    sources:
      - memory:active_work.current_task_analysis
    scope: implementation_plan + files_to_read_next + required_tests + impact_analysis + risk_level + blocking_questions

  - id: read-target-files
    type: file-read
    required: true
    depends_on: load-plan
    files: "from:plan.files_to_read_next"
    scope: exact_files_only    # no extra file reading beyond the list

  # ─── TIER 1 SKILL LOADING (CareKit Auto-Dispatch per AGENTS.md) ─────────

  - id: nestjs-carekit-context
    type: skill
    required: false
    depends_on: read-target-files
    condition: "any(files_to_read_next, f: f contains 'backend/src/modules/')"
    skill: nestjs-carekit
    also_load:
      - api-design-carekit    # paired per AGENTS.md rule #3
    scope: backend_patterns_only
    note: "nestjs-carekit + api-design-carekit loaded together for NestJS backend modules"

  - id: prisma-carekit-context
    type: skill
    required: false
    depends_on: read-target-files
    condition: "any(files_to_read_next, f: f contains '.prisma')"
    skill: prisma-carekit
    scope: schema_patterns_only
    note: "prisma-carekit for schema/migration tasks"

  - id: mobile-carekit-context
    type: skill
    required: false
    depends_on: read-target-files
    condition: "any(files_to_read_next, f: f contains 'mobile/')"
    skill: mobile-carekit
    scope: mobile_patterns_only
    note: "mobile-carekit for Expo/React Native tasks"

  - id: docker-carekit-context
    type: skill
    required: false
    depends_on: read-target-files
    condition: "any(files_to_read_next, f: f contains 'docker/') or any(files_to_read_next, f: f contains 'docker-compose')"
    skill: docker-carekit
    scope: docker_patterns_only

  - id: carekit-ds-context
    type: skill
    required: false
    depends_on: read-target-files
    condition: "impact_analysis.dashboard != null"
    skill: carekit-ds
    also_load:
      - vercel-react-best-practices    # paired per AGENTS.md rule #3
    scope: design_tokens_and_components
    note: "carekit-ds + vercel-react-best-practices loaded together for dashboard UI"

  - id: ui-ux-design-context
    type: skill
    required: false
    depends_on: carekit-ds-context
    condition: "impact_analysis.dashboard != null AND task_type in ['feature', 'refactor']"
    skill: ui-ux-pro-max
    stack: shadcn
    also_load:
      - carekit-ds    # paired per AGENTS.md rule #3
    commands:
      - "python3 .claude/skills/ui-ux-pro-max/scripts/search.py '{component_name}' --design-system -p 'CareKit'"
      - "python3 .claude/skills/ui-ux-pro-max/scripts/search.py '{component_name}' --stack shadcn"
    scope: design_guidance_only
    note: "ui-ux-pro-max supplements carekit-ds — carekit-ds rules always take precedence"

  # ─── EXECUTION ───────────────────────────────────────────────────────────

  - id: executor-display
    type: display
    agent: executor
    message: "▶ EXECUTOR — MiniMax M2.7-HS | Implementing approved plan | Target: {target_module}"

  - id: execute
    agent: executor
    type: execution
    required: true
    depends_on:
      - executor-display
      - nestjs-carekit-context
      - prisma-carekit-context
      - mobile-carekit-context
      - docker-carekit-context
      - carekit-ds-context
      - ui-ux-design-context
    prompt_file: .opencode/agents/executor.md
    input:
      - plan: "from:plan.implementation_plan"
      - files: "from:read-target-files"
      - skills_loaded: "from:active_skill_contexts"
      - target_module: "from:files_to_read_next[0]"    # first file reveals the module
    rules:
      - no_unplanned_changes: true
      - max_files_per_batch: 5
      - stop_on_unplanned_situation: true
    output:
      format: structured
      fields:
        - steps_completed
        - files_changed
        - edge_cases_noted

  - id: validate-types
    agent: auto
    type: gate
    required: true
    depends_on: execute
    command: "cd backend && npx tsc --noEmit"
    alt_command: "cd dashboard && npm run typecheck"
    on_fail:
      action: return_to_executor
      max_retries: 1

  - id: validate-lint
    agent: auto
    type: gate
    required: true
    depends_on: validate-types
    command: "cd backend && npm run lint && cd ../dashboard && npm run lint"
    on_fail:
      action: return_to_executor
      max_retries: 1

  - id: output
    type: finalization
    required: true
    depends_on: validate-lint
    actions:
      - display_executor_delivery
      - save_to_memory
    memory_key: "active_work.implementation_complete"
    next_step: "Run write-tests pipeline"
