name: analyze-task
description: CareKit Architect analysis — structure any task before implementation
trigger: manual

steps:
  - id: load-context
    type: context
    required: true
    sources:
      - opencode.md         # project memory
      - AGENTS.md           # maestro dispatch rules
    scope: sections_only    # load relevant sections, not full files

  - id: architect
    agent: architect
    type: analysis
    required: true
    depends_on: load-context
    input_scope: task_description + relevant_files_only
    prompt_file: .opencode/agents/architect.md
    output:
      format: structured
      fields:
        - task_type
        - risk_level
        - problem_statement
        - blocking_questions
        - decisions_needed
        - impact_analysis
        - implementation_plan
        - required_tests
        - files_to_read_next
        - risk_flags

  - id: decision-gate
    type: gate
    required: true
    depends_on: architect
    condition: "blocking_questions == 'none — proceed'"
    on_blocked:
      action: pause
      message: "Architect has blocking questions that must be answered before implementation. Review and respond."
    on_critical_risk:
      action: pause
      message: "CRITICAL risk detected. Review architect analysis and explicitly approve before proceeding."
      trigger_when: "risk_level == CRITICAL"

  - id: output
    type: finalization
    required: true
    depends_on: decision-gate
    actions:
      - display_analysis
      - save_to_memory
    memory_key: "active_work.current_task_analysis"
